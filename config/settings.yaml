# ============================================================
# Quant ML Trading System — Configuration
# ============================================================

project:
  name: "quant-ml-trading"
  version: "0.1.0"
  log_level: "INFO"                      # DEBUG | INFO | WARNING | ERROR

# --- Data Pipeline -----------------------------------------
data:
  tickers:
    - AAPL
    - MSFT
    - GOOGL
    - AMZN
    - META
    - NVDA
    - JPM
    - GS
    - XOM
    - JNJ

  date_range:
    start: "2018-01-01"
    end: "2025-12-31"                    # null = today

  interval: "1d"                         # 1d | 1h | 5m (yfinance intervals)

  storage:
    raw_dir: "data/raw"
    processed_dir: "data/processed"
    features_dir: "data/features"
    format: "parquet"                    # parquet | csv

  cleaning:
    max_missing_pct: 0.05               # drop ticker if >5% missing
    fill_method: "ffill"                 # ffill | interpolate
    outlier_std_threshold: 5.0           # flag rows > 5σ from rolling mean
    outlier_window: 60                   # rolling window for outlier detection

# --- Feature Engineering -----------------------------------
features:
  technical_indicators:
    sma_windows: [5, 10, 20, 50, 200]
    ema_windows: [12, 26, 50]
    rsi_period: 14
    macd:
      fast: 12
      slow: 26
      signal: 9
    bollinger:
      window: 20
      num_std: 2.0
    atr_period: 14

  returns:
    log_return_periods: [1, 5, 21]       # daily, weekly, monthly
    rolling_return_windows: [5, 10, 21, 63]
    lagged_returns: [1, 2, 3, 5]         # past day lags for 1d return

  volatility:
    rolling_windows: [5, 10, 20, 63]     # realized vol windows
    ewm_span: 21                         # exponentially weighted vol

  rolling_stats:
    windows: [5, 10, 20, 63]
    metrics: ["mean", "std", "skew"]     # rolling statistics on returns

  macro:
    tickers:
      DXY: "DX-Y.NYB"                     # US Dollar Index
      TLT: "TLT"                           # 20+ Year Treasury Bond ETF
      VIX: "^VIX"                          # CBOE Volatility Index
      GLD: "GLD"                           # Gold ETF
    return_periods: [1, 5, 10]             # daily return lookback periods
    vol_window: 20                         # rolling volatility window
    zscore_window: 60                      # rolling z-score normalization window
    trend_ma_window: 20                    # trend MA window (price / MA)

  target:
    forward_return_period: 1             # predict 1-day forward return
    classification_threshold: 0.0        # >0 = 1, <=0 = 0

# --- Backtesting Engine ------------------------------------
backtesting:
  walk_forward:
    n_splits: 5                          # number of walk-forward folds
    train_months: 12                     # train window in months
    test_months: 3                       # test window in months
    gap_days: 5                          # gap between train and test (prevent leakage)
    min_train_size: 200                  # minimum training samples

  transaction_costs:
    slippage_bps: 5                      # slippage in basis points
    commission_bps: 5                    # commission in basis points (total = 10 bps)

  initial_capital: 100000.0              # starting portfolio value

# --- Portfolio Allocation -----------------------------------
portfolio:
  allocation_type: "cvar"                  # equal_weight | risk_parity | cvar
  cvar:
    alpha: 0.95                            # CVaR confidence level (95% = 5% tail)
    lookback: 60                           # trailing days of returns for optimisation
    min_weight: 0.0                        # per-asset floor  (0 = no shorting)
    max_weight: 0.40                       # per-asset cap    (prevents over-concentration)
    rebalance_freq: 20                     # re-optimise every N trading days
    min_history: 30                        # minimum observations required
    regime_aware: true                     # dynamically tighten parameters in high vol
    high_vol_alpha: 0.99                   # stricter tail confidence during high vol
    high_vol_max_weight: 0.20              # lower cap to force diversification during high vol
    high_vol_rebalance_freq: 5             # re-optimise more frequently during high vol

  strategies:
    momentum:
      lookback_period: 21                # days of past returns to consider
      entry_threshold: 0.02             # go long if momentum > 2%
      exit_threshold: -0.01             # exit if momentum < -1%

    mean_reversion:
      rsi_oversold: 30                   # buy signal
      rsi_overbought: 70                # sell signal
      sma_window: 20                     # deviation from SMA
      sma_entry_threshold: -0.03        # buy if price 3% below SMA
      sma_exit_threshold: 0.02          # sell if price 2% above SMA

# --- Execution Model -----------------------------------
execution_model:
  use_slippage_model: true                # master toggle: true = realistic execution costs
  adv_window: 20                          # rolling window for Average Dollar Volume
  max_adv_participation: 0.05             # cap order to 5% of ADV
  spread_k: 0.15                          # spread = k * volatility * price (0.1-0.3)
  vol_window: 20                          # rolling vol window for spread/impact
  impact_exponent: 2.0                    # non-linear impact: (order/ADV)^exp
  impact_coefficient: 1.0                 # scalar on impact cost

# --- ML Pipeline ---------------------------------------
ml_pipeline:
  walk_forward:
    train_window_days: 252               # approximately 1 year of trading days
    test_window_days: 20                 # approximately 1 month of trading days

  # Bayesian Hyperparameter Optimisation (Optuna)
  optuna:
    use_optuna: true                     # master toggle: true = tune XGB/LGBM per fold
    n_trials: 30                         # Optuna trials per model per fold
    cv_splits: 3                         # TimeSeriesSplit folds inside each train window
    timeout_seconds: 120                 # max seconds per model tune (null = no limit)
    random_seed: 42                      # deterministic sampler seed
    # Search spaces: override defaults if needed (optional)
    # xgboost_space:
    #   max_depth:     { low: 2, high: 8 }
    #   learning_rate: { low: 0.005, high: 0.3 }
    #   n_estimators:  { low: 50, high: 500 }
    #   subsample:     { low: 0.5, high: 1.0 }
    # lightgbm_space:
    #   max_depth:     { low: 2, high: 8 }
    #   learning_rate: { low: 0.005, high: 0.3 }
    #   n_estimators:  { low: 50, high: 500 }
    #   subsample:     { low: 0.5, high: 1.0 }

  meta_model:
    enabled: true                        # master toggle for meta-model
    primary_model: "Ensemble"            # which primary model to gate
    accuracy_window: 20                  # rolling window for primary model accuracy
    sharpe_window: 20                    # rolling window for strategy Sharpe
    stability_window: 10                 # rolling window for prediction variance
    vol_window: 20                       # volatility lookup window
    profit_threshold: 0.0                # trade outcome > this = label 1
    min_train_samples: 50                # minimum samples to fit meta-model
    confidence_threshold: 0.50           # meta-model's own gate (unused for LR baseline)

